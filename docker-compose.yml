  #     GIT_REPOS_ROOT: /data/repos
  #     GLEAMHUB_GIT_HOST: ${GLEAMHUB_GIT_HOST:-localhost}
  #     PORT: "9999"
  #   volumes:
  #     - ./server/data/repos:/data/repos
  #   ports:
  #     - "9999:9999"

  git-ssh:
    build:
      context: ./git-ssh
    environment:
      # Use host.docker.internal when the API runs via local `gleam run` (Mac/Windows Docker Desktop)
      GLEAMHUB_API_URL: ${GLEAMHUB_API_URL:-http://host.docker.internal:9999}
      GIT_REPOS_ROOT: /data/repos
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token-change-me}
    volumes:
      # Same path as local `gleam run` (GIT_REPOS_ROOT=./data/repos under server/)
      - ./server/data/repos:/data/repos
    ports:
      - "2222:22"

volumes:
  gleamhub-pg:
