# Ephemeral Postgres for local integration tests.
# Started automatically by `gleam test` in server/ (see server/README.md).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gleamhub_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gleamhub_test"]
      interval: 2s
      timeout: 3s
      retries: 15
