# Self-hosted CI stack for gleamhub (Dagger engine + worker).
# Requires the gleamhub API and git repos volume from the main dev stack.

services:
  dagger-engine:
    image: registry.dagger.io/engine:v0.20.8
    privileged: true
    volumes:
      - dagger-engine-data:/var/lib/dagger
    restart: unless-stopped

  ci-worker:
    build:
      context: ./ci-worker
    depends_on:
      - dagger-engine
    environment:
      GLEAMHUB_API_URL: ${GLEAMHUB_API_URL:-http://host.docker.internal:9999}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token-change-me}
      GIT_REPOS_ROOT: /data/repos
      _EXPERIMENTAL_DAGGER_RUNNER_HOST: container://dagger-engine
      CI_POLL_SECONDS: ${CI_POLL_SECONDS:-5}
      CI_JOB_TIMEOUT_SECONDS: ${CI_JOB_TIMEOUT_SECONDS:-1800}
    volumes:
      - ./server/data/repos:/data/repos:ro
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  dagger-engine-data:
